<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Dispatch | Tenant Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

<div class="flex h-screen">
  <aside class="w-64 bg-slate-800 border-r border-teal-900/50 p-6">
    <h1 class="text-2xl font-bold text-teal-400 mb-8">Dispatch</h1>
    <nav class="space-y-4">
      <a href="#" class="block py-2.5 px-4 rounded bg-teal-600/20 text-teal-300">Branch Overview</a>
      <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Team Management</a>
      <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Active Tickets</a>
      <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Reports</a>
    </nav>

    <div class="mt-auto pt-8 border-t border-slate-700">
      <p class="text-xs text-teal-500 uppercase font-bold tracking-widest mb-1" th:text="${branchName}">Branch Name</p>
      <p class="text-sm text-slate-400 font-medium" sec:authentication="name">Username</p>
      <p class="text-xs text-slate-500 mb-4" sec:authentication="principal.authorities"></p>

      <form th:action="@{/logout}" method="post">
        <button type="submit" class="w-full text-left text-xs text-rose-400 hover:text-rose-300 transition">
          Sign Out
        </button>
      </form>
    </div>
  </aside>

  <main class="flex-1 p-10 overflow-y-auto">
    <header class="mb-10 flex justify-between items-center">
      <div>
        <h2 class="text-3xl font-semibold" th:text="${branchName}">Branch Dashboard</h2>
        <p class="text-slate-400">Managing operations for your assigned territory.</p>
      </div>
      <div class="bg-teal-900/30 border border-teal-500/30 px-4 py-2 rounded text-teal-300 text-sm">
        Branch Status: <span class="font-bold">Active</span>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
        <h3 class="text-lg font-medium mb-4">Open Tickets</h3>
        <div class="text-4xl font-bold text-teal-400">24</div>
        <p class="text-sm text-slate-500 mt-2">4 tickets require immediate lead attention.</p>
      </div>

      <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
        <h3 class="text-lg font-medium mb-4">Team Status</h3>
        <div class="space-y-3">
          <div class="flex justify-between text-sm">
            <span class="text-slate-400">Leads On-Call</span>
            <span class="text-teal-400 font-mono">3</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-400">Active Associates</span>
            <span class="text-teal-400 font-mono">12</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
