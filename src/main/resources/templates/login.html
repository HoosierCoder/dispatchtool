<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dispatch | Login</title>
    <style>
        :root {
            --primary-teal: #0D9488;
            --dark-slate: #1E293B;
            --bg-light: #F8FAFC;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .brand {
            color: var(--primary-teal);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .tenant-badge {
            text-align: center;
            color: #64748B;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--dark-slate); }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #CBD5E1;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover { opacity: 0.9; }
        .error { color: #DC2626; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">Dispatch</div>

    <!-- Show tenant ID if present -->
    <div th:if="${tenantId}" class="tenant-badge">
        Sign in to <span th:text="${tenantId}">Tenant</span>
    </div>

    <div th:if="${param.error}" class="error">
        Invalid username or password.
    </div>

    <form id="loginForm" th:action="@{/login}" method="post">
        <!-- Hidden field to store the tenant ID -->
        <input type="hidden" id="tenantId" th:value="${tenantId}" />

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" name="username" required autofocus />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required />
        </div>
        <button type="submit">Sign In</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const tenantId = document.getElementById('tenantId').value;
        const usernameInput = document.getElementById('username');

        if (tenantId && usernameInput.value && !usernameInput.value.includes('@')) {
            // Append the tenant ID to the username before submitting
            usernameInput.value = usernameInput.value + '@' + tenantId;
        }
    });
</script>
</body>
</html>
